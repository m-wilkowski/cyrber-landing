<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CYRBER</title>
<meta name="description" content="Videt omnia. Meminit omnia. Iudicat omnia.">
<meta name="theme-color" content="#0a0a0f">
<link rel="icon" type="image/png" href="/cyrber-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0f;
  --red: #ef4444;
  --text: #b0b0bc;
  --text-dim: #7a7a8a;
  --text-vdim: #55556a;
}

body {
  background: var(--bg);
  color: #e4e4e8;
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Scan lines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.005) 2px,
    rgba(255,255,255,0.005) 4px
  );
  pointer-events: none;
  z-index: 100;
}

/* Red glow behind logo — pulsing */
.glow {
  position: fixed;
  width: 700px;
  height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--red) 0%, transparent 70%);
  filter: blur(80px);
  opacity: 0.06;
  pointer-events: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -52%);
  z-index: 0;
  animation: glowPulse 6s ease-in-out infinite;
}

.container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px;
  max-width: 700px;
}

/* Logo hub — circle + spark + logo */
.logo-hub {
  position: relative;
  width: min(540px, 90vw);
  height: min(540px, 90vw);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 44px;
  animation: emerge 2.5s ease both;
}

/* Orbit ring */
.orbit-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(239, 68, 68, 0.1);
}

/* Inner ring */
.orbit-ring-inner {
  position: absolute;
  inset: 24px;
  border-radius: 50%;
  border: 1px solid rgba(239, 68, 68, 0.05);
}

/* SVG spark that orbits the ring */
.orbit-spark {
  position: absolute;
  inset: -4px;
  animation: orbit 8s linear infinite;
}
.orbit-spark circle { filter: blur(1px); }

/* Second spark — reverse */
.orbit-spark-2 {
  position: absolute;
  inset: -4px;
  animation: orbit 12s linear infinite reverse;
}

/* Tick marks */
.ring-ticks {
  position: absolute;
  inset: 0;
  animation: tickRotate 120s linear infinite;
}

/* Logo — clipped to circle, blends with ring */
.logo-circle {
  position: relative;
  z-index: 2;
  width: 82%;
  height: 82%;
  border-radius: 50%;
  overflow: hidden;
  /* Radial gradient overlay: transparent center, fades to page bg at edges */
  background: var(--bg);
}
.logo-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: drop-shadow(0 0 40px rgba(239,68,68,0.1));
  transition: filter 0.6s;
  /* Mask: fade edges to transparent so it blends into the circle */
  mask-image: radial-gradient(circle, #000 50%, transparent 72%);
  -webkit-mask-image: radial-gradient(circle, #000 50%, transparent 72%);
}
.logo-circle:hover img {
  filter: drop-shadow(0 0 60px rgba(239,68,68,0.2));
}

/* Motto */
.motto {
  font-size: clamp(0.65rem, 1.4vw, 0.82rem);
  letter-spacing: 0.35em;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 48px;
  animation: emerge 2s ease 0.8s both;
}

/* Thin line */
.line {
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
  margin-bottom: 48px;
  animation: emerge 2s ease 1.2s both;
}

/* Three names */
.three {
  display: flex;
  gap: 40px;
  margin-bottom: 56px;
  animation: emerge 2s ease 1.6s both;
}
.three span {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  color: var(--text-vdim);
  transition: color 0.5s;
}
.three span:hover {
  color: var(--text);
}
.three .sep {
  font-family: 'Share Tech Mono', monospace;
  font-weight: 400;
  color: rgba(239,68,68,0.25);
  letter-spacing: 0;
}

/* Teaser */
.teaser {
  font-size: 0.78rem;
  letter-spacing: 0.15em;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 64px;
  animation: emerge 2s ease 2s both;
}

/* Contact */
.contact {
  animation: emerge 2s ease 2.4s both;
  text-align: center;
}
.contact a {
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  color: var(--text-vdim);
  text-decoration: none;
  transition: color 0.4s;
}
.contact a:hover {
  color: var(--text);
}

.contact-divider {
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(239,68,68,0.3), transparent);
  margin: 28px auto;
}

.contact-matrix {
  display: inline-block;
  padding: 10px 24px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  color: var(--text-dim);
  text-decoration: none;
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  transition: border-color 0.3s, color 0.3s;
  margin-top: 8px;
  cursor: pointer;
  background: none;
  font-family: inherit;
}
.contact-matrix:hover {
  border-color: rgba(255,255,255,0.4);
  color: #e4e4e8;
}

.contact-note {
  font-size: 0.6rem;
  color: var(--text-vdim);
  margin-top: 8px;
  letter-spacing: 0.05em;
  opacity: 0.7;
}

/* Chat modal */
.chat-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s, visibility 0.3s;
}
.chat-overlay.active {
  opacity: 1;
  visibility: visible;
}

.chat-modal {
  width: min(440px, 92vw);
  height: min(620px, 85vh);
  background: #0c0c14;
  border: 1px solid rgba(239, 68, 68, 0.15);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 80px rgba(239, 68, 68, 0.06), 0 0 1px rgba(255,255,255,0.1);
  transform: scale(0.95) translateY(10px);
  transition: transform 0.3s ease;
}
.chat-overlay.active .chat-modal {
  transform: scale(1) translateY(0);
}

.chat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.chat-header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.chat-header-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--text-dim);
}
.chat-status {
  font-size: 0.55rem;
  color: var(--text-vdim);
  letter-spacing: 0.05em;
}
.chat-status-dot {
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--red);
  margin-right: 4px;
  vertical-align: middle;
  animation: pulse 3s ease-in-out infinite;
}
.chat-close {
  background: none;
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-dim);
  width: 28px;
  height: 28px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.2s, color 0.2s;
  font-family: inherit;
}
.chat-close:hover {
  border-color: rgba(239,68,68,0.4);
  color: #e4e4e8;
}

/* Chat messages area */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.08) transparent;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

.chat-msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 0.75rem;
  line-height: 1.5;
  letter-spacing: 0.02em;
  word-wrap: break-word;
}
.chat-msg-them {
  align-self: flex-start;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  color: var(--text);
}
.chat-msg-me {
  align-self: flex-end;
  background: rgba(239, 68, 68, 0.08);
  border: 1px solid rgba(239, 68, 68, 0.12);
  color: #e4e4e8;
}
.chat-msg-sender {
  font-size: 0.6rem;
  color: var(--red);
  margin-bottom: 4px;
  font-weight: 700;
  letter-spacing: 0.08em;
}
.chat-msg-time {
  font-size: 0.5rem;
  color: var(--text-vdim);
  margin-top: 4px;
  text-align: right;
}
.chat-msg-system {
  align-self: center;
  background: none;
  border: none;
  color: var(--text-vdim);
  font-size: 0.6rem;
  text-align: center;
  letter-spacing: 0.08em;
  padding: 6px 0;
}

/* Chat input */
.chat-input-wrap {
  padding: 12px 18px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  padding: 10px 14px;
  color: #e4e4e8;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  outline: none;
  transition: border-color 0.2s;
  resize: none;
}
.chat-input:focus {
  border-color: rgba(239, 68, 68, 0.3);
}
.chat-input::placeholder {
  color: var(--text-vdim);
}
.chat-send {
  background: rgba(239, 68, 68, 0.12);
  border: 1px solid rgba(239, 68, 68, 0.2);
  border-radius: 4px;
  color: var(--red);
  padding: 10px 16px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.75rem;
  transition: background 0.2s, border-color 0.2s;
  white-space: nowrap;
}
.chat-send:hover {
  background: rgba(239, 68, 68, 0.2);
  border-color: rgba(239, 68, 68, 0.4);
}
.chat-send:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* Chat footer */
.chat-footer {
  padding: 8px 18px;
  border-top: 1px solid rgba(255,255,255,0.04);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.chat-footer-lock {
  color: rgba(239, 68, 68, 0.4);
  font-size: 0.7rem;
}
.chat-footer-info {
  font-size: 0.5rem;
  color: var(--text-vdim);
  letter-spacing: 0.04em;
  line-height: 1.4;
}

/* Loading spinner */
.chat-loading {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--text-vdim);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
}
.chat-spinner {
  width: 24px;
  height: 24px;
  border: 2px solid rgba(239,68,68,0.1);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: orbit 1s linear infinite;
}

/* Pulse dot */
.pulse {
  display: inline-block;
  width: 5px;
  height: 5px;
  background: var(--red);
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: middle;
  animation: pulse 3s ease-in-out infinite;
}

@keyframes emerge {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 0.8; box-shadow: 0 0 0 0 rgba(239,68,68,0.3); }
  50% { opacity: 0.3; box-shadow: 0 0 0 6px rgba(239,68,68,0); }
}
@keyframes orbit {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes tickRotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.06; transform: translate(-50%, -52%) scale(1); }
  50% { opacity: 0.09; transform: translate(-50%, -52%) scale(1.05); }
}
</style>
</head>
<body>

<div class="glow"></div>

<div class="container">

  <div class="logo-hub">
    <!-- Outer orbit ring -->
    <div class="orbit-ring"></div>
    <!-- Inner ring -->
    <div class="orbit-ring-inner"></div>
    <!-- Tick marks -->
    <svg class="ring-ticks" viewBox="0 0 540 540">
      <line x1="270" y1="0" x2="270" y2="10" stroke="rgba(239,68,68,0.14)" stroke-width="1"/>
      <line x1="270" y1="530" x2="270" y2="540" stroke="rgba(239,68,68,0.14)" stroke-width="1"/>
      <line x1="0" y1="270" x2="10" y2="270" stroke="rgba(239,68,68,0.14)" stroke-width="1"/>
      <line x1="530" y1="270" x2="540" y2="270" stroke="rgba(239,68,68,0.14)" stroke-width="1"/>
      <line x1="79" y1="79" x2="86" y2="86" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
      <line x1="454" y1="454" x2="461" y2="461" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
      <line x1="461" y1="79" x2="454" y2="86" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
      <line x1="86" y1="454" x2="79" y2="461" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
    </svg>
    <!-- Spark 1 -->
    <svg class="orbit-spark" viewBox="0 0 548 548">
      <circle cx="274" cy="4" r="3" fill="#ffffff" opacity="0.9"/>
      <circle cx="274" cy="4" r="6" fill="#ffffff" opacity="0.3"/>
      <circle cx="274" cy="4" r="12" fill="#ffffff" opacity="0.06"/>
    </svg>
    <!-- Spark 2 — reverse -->
    <svg class="orbit-spark-2" viewBox="0 0 548 548">
      <circle cx="274" cy="4" r="2" fill="#ffffff" opacity="0.5"/>
      <circle cx="274" cy="4" r="5" fill="#ffffff" opacity="0.12"/>
    </svg>
    <!-- Logo — clipped to circle, edges fade into background -->
    <div class="logo-circle">
      <img src="/cyrber-logo.png" alt="CYRBER">
    </div>
  </div>

  <p class="motto">VIDET OMNIA &middot; MEMINIT OMNIA &middot; IUDICAT OMNIA</p>

  <div class="line"></div>

  <div class="three">
    <span>RATIO</span>
    <span class="sep">/</span>
    <span>ANIMUS</span>
    <span class="sep">/</span>
    <span>FATUM</span>
  </div>

  <div class="teaser"><span class="pulse"></span>NADCHODZI</div>

  <div class="contact">
    <a href="mailto:kontakt@cyrber.pl">kontakt@cyrber.pl</a>
    <div class="contact-divider"></div>
    <button onclick="openChat()" class="contact-matrix">
      💬 Napisz do nas · Matrix
    </button>
    <p class="contact-note">Szyfrowanie end-to-end · Self-hosted · Protokół Matrix</p>
  </div>

</div>

<!-- Chat modal -->
<div class="chat-overlay" id="chatOverlay" onclick="if(event.target===this)closeChat()">
  <div class="chat-modal">
    <div class="chat-header">
      <div class="chat-header-left">
        <span class="chat-header-title">CYRBER · KONTAKT</span>
        <span class="chat-status" id="chatStatus"></span>
      </div>
      <button class="chat-close" onclick="closeChat()" title="Zamknij (Esc)">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-loading" id="chatLoading">
        <div class="chat-spinner"></div>
        <span>Nawiązywanie połączenia...</span>
      </div>
    </div>
    <div class="chat-input-wrap" id="chatInputWrap" style="display:none">
      <textarea class="chat-input" id="chatInput" placeholder="Napisz wiadomość..." rows="1"></textarea>
      <button class="chat-send" id="chatSend" onclick="sendMessage()">Wyślij</button>
    </div>
    <div class="chat-footer">
      <span class="chat-footer-lock">🔒</span>
      <span class="chat-footer-info">
        Szyfrowanie E2EE · Serwer własny CYRBER · Nikt poza Tobą i nami nie czyta tej rozmowy
      </span>
    </div>
  </div>
</div>

<script>
(function() {
  var HS = 'https://matrix.cyrber.pl';
  var ROOM_ALIAS = '#kontakt-web:matrix.cyrber.pl';
  var state = { token: null, roomId: null, since: null, polling: false, userId: null };

  function api(method, path, body) {
    var opts = { method: method, headers: {} };
    if (state.token) opts.headers['Authorization'] = 'Bearer ' + state.token;
    if (body) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    return fetch(HS + '/_matrix/client/v3' + path, opts).then(function(r) {
      if (!r.ok) return r.json().then(function(e) { throw e; });
      return r.json();
    });
  }

  function setStatus(html) {
    document.getElementById('chatStatus').innerHTML = html;
  }

  function addMsg(sender, body, ts, isMe) {
    var msgs = document.getElementById('chatMessages');
    var div = document.createElement('div');
    if (sender === '__system__') {
      div.className = 'chat-msg chat-msg-system';
      div.textContent = body;
    } else {
      div.className = 'chat-msg ' + (isMe ? 'chat-msg-me' : 'chat-msg-them');
      var name = sender.replace(/@(.+):.*/, '$1');
      if (!isMe) {
        var s = document.createElement('div');
        s.className = 'chat-msg-sender';
        s.textContent = name;
        div.appendChild(s);
      }
      var t = document.createElement('div');
      t.textContent = body;
      div.appendChild(t);
      if (ts) {
        var time = document.createElement('div');
        time.className = 'chat-msg-time';
        var d = new Date(ts);
        time.textContent = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
        div.appendChild(time);
      }
    }
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function processSync(data) {
    if (!data.rooms || !data.rooms.join || !data.rooms.join[state.roomId]) return;
    var room = data.rooms.join[state.roomId];
    var events = (room.timeline && room.timeline.events) || [];
    events.forEach(function(ev) {
      if (ev.type === 'm.room.message' && ev.content && ev.content.body) {
        addMsg(ev.sender, ev.content.body, ev.origin_server_ts, ev.sender === state.userId);
      }
    });
  }

  function poll() {
    if (!state.polling) return;
    var url = '/_matrix/client/v3/sync?timeout=20000';
    if (state.since) url += '&since=' + encodeURIComponent(state.since);
    else url += '&filter=' + encodeURIComponent(JSON.stringify({room:{rooms:[state.roomId],timeline:{limit:30}}}));

    var opts = { headers: { 'Authorization': 'Bearer ' + state.token } };
    fetch(HS + url, opts)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.next_batch) state.since = data.next_batch;
        processSync(data);
        if (state.polling) poll();
      })
      .catch(function() {
        if (state.polling) setTimeout(poll, 5000);
      });
  }

  function initChat() {
    setStatus('Łączenie...');
    document.getElementById('chatLoading').style.display = 'flex';
    document.getElementById('chatInputWrap').style.display = 'none';

    // Register as guest
    api('POST', '/register?kind=guest', { initial_device_display_name: 'CYRBER Web Chat' })
      .then(function(reg) {
        state.token = reg.access_token;
        state.userId = reg.user_id;

        // Resolve room alias to ID
        return api('GET', '/directory/room/' + encodeURIComponent(ROOM_ALIAS));
      })
      .then(function(dir) {
        state.roomId = dir.room_id;

        // Join room
        return api('POST', '/join/' + encodeURIComponent(state.roomId), {});
      })
      .then(function() {
        // Ready
        document.getElementById('chatLoading').style.display = 'none';
        document.getElementById('chatInputWrap').style.display = 'flex';
        setStatus('<span class="chat-status-dot"></span> Połączono');
        addMsg('__system__', 'Połączono z CYRBER. Napisz wiadomość — odpowiemy jak najszybciej.');
        state.polling = true;
        poll();
      })
      .catch(function(err) {
        console.error('Matrix chat error:', err);
        document.getElementById('chatLoading').innerHTML =
          '<span style="color:var(--red)">Nie udało się połączyć</span>' +
          '<span style="font-size:0.6rem;color:var(--text-vdim)">Spróbuj ponownie lub napisz na kontakt@cyrber.pl</span>';
        setStatus('Rozłączono');
      });
  }

  window.openChat = function() {
    document.getElementById('chatOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
    if (!state.token) initChat();
  };

  window.closeChat = function() {
    document.getElementById('chatOverlay').classList.remove('active');
    document.body.style.overflow = '';
  };

  window.sendMessage = function() {
    var input = document.getElementById('chatInput');
    var text = input.value.trim();
    if (!text || !state.token || !state.roomId) return;
    input.value = '';
    var txnId = 'm' + Date.now();
    api('PUT', '/rooms/' + encodeURIComponent(state.roomId) + '/send/m.room.message/' + txnId, {
      msgtype: 'm.text',
      body: text
    }).catch(function(err) {
      console.error('Send error:', err);
      addMsg('__system__', 'Nie udało się wysłać wiadomości. Spróbuj ponownie.');
    });
  };

  // Enter to send
  document.addEventListener('DOMContentLoaded', function() {
    var input = document.getElementById('chatInput');
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeChat();
  });
})();
</script>

</body>
</html>
