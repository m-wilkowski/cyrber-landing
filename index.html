<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CYRBER</title>
<meta name="description" content="Videt omnia. Meminit omnia. Iudicat omnia.">
<meta name="theme-color" content="#0a0a0f">
<link rel="icon" type="image/png" href="/cyrber-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0f;
  --red: #ef4444;
  --text: #b0b0bc;
  --text-dim: #7a7a8a;
  --text-vdim: #55556a;
}

body {
  background: var(--bg);
  color: #e4e4e8;
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 2vh;
}

/* Scan lines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.005) 2px,
    rgba(255,255,255,0.005) 4px
  );
  pointer-events: none;
  z-index: 100;
}

/* Red glow behind logo — pulsing */
.glow {
  position: fixed;
  width: 700px;
  height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--red) 0%, transparent 70%);
  filter: blur(80px);
  opacity: 0.06;
  pointer-events: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -52%);
  z-index: 0;
  animation: glowPulse 6s ease-in-out infinite;
}

.container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px;
  max-width: 700px;
}

/* Logo hub — circle + spark + logo */
.logo-hub {
  position: relative;
  width: min(540px, 90vw);
  height: min(540px, 90vw);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 44px;
  animation: emerge 2.5s ease both;
}

/* Orbit ring */
.orbit-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(239, 68, 68, 0.1);
}

/* Inner ring */
.orbit-ring-inner {
  position: absolute;
  inset: 24px;
  border-radius: 50%;
  border: 1px solid rgba(239, 68, 68, 0.05);
}

/* SVG spark that orbits the ring */
.orbit-spark {
  position: absolute;
  inset: -4px;
  animation: orbit 8s linear infinite;
}
.orbit-spark circle { filter: blur(1px); }

/* Second spark — reverse */
.orbit-spark-2 {
  position: absolute;
  inset: -4px;
  animation: orbit 12s linear infinite reverse;
}

/* Tick marks */
.ring-ticks {
  position: absolute;
  inset: 0;
  animation: tickRotate 120s linear infinite;
}

/* Logo — clipped to circle, blends with ring */
.logo-circle {
  position: relative;
  z-index: 2;
  width: 82%;
  height: 82%;
  border-radius: 50%;
  overflow: hidden;
  /* Radial gradient overlay: transparent center, fades to page bg at edges */
  background: var(--bg);
}
.logo-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: drop-shadow(0 0 40px rgba(239,68,68,0.1));
  transition: filter 0.6s;
  /* Mask: fade edges to transparent so it blends into the circle */
  mask-image: radial-gradient(circle, #000 50%, transparent 72%);
  -webkit-mask-image: radial-gradient(circle, #000 50%, transparent 72%);
}
.logo-circle:hover img {
  filter: drop-shadow(0 0 60px rgba(239,68,68,0.2));
}

/* Motto */
.motto {
  font-size: clamp(0.65rem, 1.4vw, 0.82rem);
  letter-spacing: 0.35em;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 48px;
  animation: emerge 2s ease 0.8s both;
}

/* Thin line */
.line {
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
  margin-bottom: 48px;
  animation: emerge 2s ease 1.2s both;
}

/* Three names */
.three {
  display: flex;
  gap: 40px;
  margin-bottom: 56px;
  animation: emerge 2s ease 1.6s both;
}
.three span {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  color: var(--text-vdim);
  transition: color 0.5s;
}
.three span:hover {
  color: var(--text);
}
.three .sep {
  font-family: 'Share Tech Mono', monospace;
  font-weight: 400;
  color: rgba(239,68,68,0.25);
  letter-spacing: 0;
}

/* Teaser */
.teaser {
  font-size: 0.78rem;
  letter-spacing: 0.15em;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 64px;
  animation: emerge 2s ease 2s both;
}

/* Contact */
.contact {
  animation: emerge 2s ease 2.4s both;
  text-align: center;
}
.contact a {
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  color: var(--text-vdim);
  text-decoration: none;
  transition: color 0.4s;
}
.contact a:hover {
  color: var(--text);
}

.contact-divider {
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(239,68,68,0.3), transparent);
  margin: 28px auto;
}

/* Matrix widget */
.matrix-widget-container {
  max-width: 700px;
  margin: 2rem auto;
  padding: 0 1rem;
}

.matrix-label {
  font-size: 0.7rem;
  color: rgba(255,255,255,0.3);
  text-align: center;
  margin-bottom: 0.75rem;
  letter-spacing: 0.05em;
}

/* Pulse dot */
.pulse {
  display: inline-block;
  width: 5px;
  height: 5px;
  background: var(--red);
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: middle;
  animation: pulse 3s ease-in-out infinite;
}

@keyframes emerge {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 0.8; box-shadow: 0 0 0 0 rgba(239,68,68,0.3); }
  50% { opacity: 0.3; box-shadow: 0 0 0 6px rgba(239,68,68,0); }
}
@keyframes orbit {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes tickRotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.06; transform: translate(-50%, -52%) scale(1); }
  50% { opacity: 0.09; transform: translate(-50%, -52%) scale(1.05); }
}
</style>
</head>
<body>

<div class="glow"></div>

<div class="container">

  <div class="logo-hub">
    <!-- Outer orbit ring -->
    <div class="orbit-ring"></div>
    <!-- Inner ring -->
    <div class="orbit-ring-inner"></div>
    <!-- Tick marks -->
    <svg class="ring-ticks" viewBox="0 0 540 540">
      <line x1="270" y1="0" x2="270" y2="10" stroke="rgba(239,68,68,0.14)" stroke-width="1"/>
      <line x1="270" y1="530" x2="270" y2="540" stroke="rgba(239,68,68,0.14)" stroke-width="1"/>
      <line x1="0" y1="270" x2="10" y2="270" stroke="rgba(239,68,68,0.14)" stroke-width="1"/>
      <line x1="530" y1="270" x2="540" y2="270" stroke="rgba(239,68,68,0.14)" stroke-width="1"/>
      <line x1="79" y1="79" x2="86" y2="86" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
      <line x1="454" y1="454" x2="461" y2="461" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
      <line x1="461" y1="79" x2="454" y2="86" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
      <line x1="86" y1="454" x2="79" y2="461" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
    </svg>
    <!-- Spark 1 -->
    <svg class="orbit-spark" viewBox="0 0 548 548">
      <circle cx="274" cy="4" r="3" fill="#ffffff" opacity="0.9"/>
      <circle cx="274" cy="4" r="6" fill="#ffffff" opacity="0.3"/>
      <circle cx="274" cy="4" r="12" fill="#ffffff" opacity="0.06"/>
    </svg>
    <!-- Spark 2 — reverse -->
    <svg class="orbit-spark-2" viewBox="0 0 548 548">
      <circle cx="274" cy="4" r="2" fill="#ffffff" opacity="0.5"/>
      <circle cx="274" cy="4" r="5" fill="#ffffff" opacity="0.12"/>
    </svg>
    <!-- Logo — clipped to circle, edges fade into background -->
    <div class="logo-circle">
      <img src="/cyrber-logo.png" alt="CYRBER">
    </div>
  </div>

  <p class="motto">VIDET OMNIA &middot; MEMINIT OMNIA &middot; IUDICAT OMNIA</p>

  <div class="line"></div>

  <div class="three">
    <span>RATIO</span>
    <span class="sep">/</span>
    <span>ANIMUS</span>
    <span class="sep">/</span>
    <span>FATUM</span>
  </div>

  <div class="teaser"><span class="pulse"></span>NADCHODZI</div>

  <div class="contact">
    <div class="matrix-widget-container">
      <p class="matrix-label">
        Napisz do nas · Komunikacja szyfrowana E2E · Self-hosted · Protokół Matrix
      </p>
      <iframe
        src="https://chat.cyrber.pl/#/room/#support:matrix.cyrber.pl"
        allow="camera; microphone; display-capture; autoplay"
        style="width:100%; height:500px; border:none; border-radius:8px;"
        title="CYRBER Chat">
      </iframe>
    </div>
    <div class="contact-divider"></div>
    <a href="mailto:kontakt@cyrber.pl">kontakt@cyrber.pl</a>
  </div>

</div>

</body>
</html>
