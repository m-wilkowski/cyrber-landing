<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CYRBER</title>
<meta name="description" content="Videt omnia. Meminit omnia. Iudicat omnia.">
<meta name="theme-color" content="#0a0a0f">
<link rel="icon" type="image/png" href="/cyrber-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0f;
  --red: #ef4444;
  --muted: #444450;
  --dim: #2a2a35;
}

body {
  background: var(--bg);
  color: #e4e4e8;
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Scan lines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.006) 2px,
    rgba(255,255,255,0.006) 4px
  );
  pointer-events: none;
  z-index: 100;
}

/* Single red glow behind logo */
.glow {
  position: fixed;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: var(--red);
  filter: blur(160px);
  opacity: 0.04;
  pointer-events: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px;
  max-width: 600px;
}

/* Logo — big, classic */
.logo {
  width: min(360px, 70vw);
  height: auto;
  margin-bottom: 48px;
  animation: emerge 2.5s ease both;
  filter: drop-shadow(0 0 60px rgba(239,68,68,0.08));
  transition: filter 0.6s;
}
.logo:hover {
  filter: drop-shadow(0 0 80px rgba(239,68,68,0.15));
}

/* Motto */
.motto {
  font-size: clamp(0.6rem, 1.3vw, 0.75rem);
  letter-spacing: 0.4em;
  color: var(--muted);
  text-align: center;
  margin-bottom: 64px;
  animation: emerge 2s ease 0.8s both;
}

/* Thin line */
.line {
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
  margin-bottom: 64px;
  animation: emerge 2s ease 1.2s both;
}

/* Three names — no descriptions, just cryptic */
.three {
  display: flex;
  gap: 40px;
  margin-bottom: 72px;
  animation: emerge 2s ease 1.6s both;
}
.three span {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  color: var(--dim);
  transition: color 0.5s;
}
.three span:hover {
  color: var(--muted);
}
.three .sep {
  font-family: 'Share Tech Mono', monospace;
  font-weight: 400;
  color: rgba(239,68,68,0.2);
  letter-spacing: 0;
}

/* Teaser — one cryptic line */
.teaser {
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-align: center;
  margin-bottom: 80px;
  animation: emerge 2s ease 2s both;
  line-height: 2;
}

/* Contact — minimal */
.contact {
  animation: emerge 2s ease 2.4s both;
}
.contact a {
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  color: var(--dim);
  text-decoration: none;
  transition: color 0.4s;
}
.contact a:hover {
  color: var(--muted);
}

/* Pulse dot */
.pulse {
  display: inline-block;
  width: 5px;
  height: 5px;
  background: var(--red);
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: middle;
  animation: pulse 3s ease-in-out infinite;
}

@keyframes emerge {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 0.8; box-shadow: 0 0 0 0 rgba(239,68,68,0.3); }
  50% { opacity: 0.3; box-shadow: 0 0 0 6px rgba(239,68,68,0); }
}
</style>
</head>
<body>

<div class="glow"></div>

<div class="container">

  <img src="/cyrber-logo.png" alt="CYRBER" class="logo">

  <p class="motto">VIDET OMNIA &middot; MEMINIT OMNIA &middot; IUDICAT OMNIA</p>

  <div class="line"></div>

  <div class="three">
    <span>RATIO</span>
    <span class="sep">/</span>
    <span>ANIMUS</span>
    <span class="sep">/</span>
    <span>FATUM</span>
  </div>

  <div class="teaser"><span class="pulse"></span>NADCHODZI</div>

  <div class="contact">
    <a href="mailto:kontakt@cyrber.pl">kontakt@cyrber.pl</a>
  </div>

</div>

</body>
</html>
